      --radius-md: 0.75rem; --radius-lg: 1rem; --radius-full: 9999px;
      --color-bg: #f7f6f2; --color-surface: #f9f8f5; --color-surface-2: #ffffff; --color-text: #28251d;
      --color-text-muted: #6f6b63; --color-border: #d4d1ca; --color-primary: #01696f; --color-primary-hover: #0c4e54; --color-chip: #dff1ef;

      --shadow-md: 0 10px 30px rgba(40,37,29,0.08);
    }
    [data-theme="dark"] {
      --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #22211f; --color-text: #ece8df;
      --color-text-muted: #b2aca2; --color-border: #393836; --color-primary: #4f98a3; --color-primary-hover: #68abb5; --color-chip: #2c3f40;
      --shadow-md: 0 10px 30px rgba(0,0,0,0.35);
    }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; font-family:var(--font-body); background:linear-gradient(180deg,var(--color-bg),var(--color-surface)); color:var(--color-text); }
    .wrap { max-width:980px; margin:0 auto; padding:var(--space-6); }
    .topbar,.controls,.filters,.nav-actions,.practice-actions { display:flex; flex-wrap:wrap; gap:var(--space-3); }
    .topbar { justify-content:space-between; align-items:center; margin-bottom:var(--space-6); }
    h1 { margin:0 0 var(--space-2); font-size:var(--text-xl); }
    h2 { margin:0; font-size:var(--text-lg); }
    p { margin:0; color:var(--color-text-muted); }
    .panel { background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--radius-lg); padding:var(--space-6); box-shadow:var(--shadow-md); }
    button { min-height:44px; padding:0.9rem 1rem; border-radius:var(--radius-full); border:1px solid transparent; background:var(--color-surface-2); color:var(--color-text); font-weight:700; cursor:pointer; }
    button.primary { background:var(--color-primary); color:#fff; }
    button.primary:hover { background:var(--color-primary-hover); }
    button.ghost { background:transparent; border-color:var(--color-border); }
    .chip { background:var(--color-chip); }
    .chip.active { border-color:var(--color-primary); color:var(--color-primary); }
    .card { margin-top:var(--space-6); min-height:360px; display:grid; gap:var(--space-4); align-content:space-between; }
    .meta { display:flex; justify-content:space-between; gap:var(--space-3); color:var(--color-text-muted); font-size:var(--text-sm); }
    .jp { font-family:var(--font-display); font-size:clamp(2rem,1.4rem + 2vw,3.2rem); font-weight:700; }
    .reading { color:var(--color-primary); font-size:var(--text-lg); }
    .meaning { font-size:var(--text-lg); }
    .example,.small { color:var(--color-text-muted); }
    .hidden { display:none; }
    .practice { margin-top:var(--space-6); display:grid; gap:var(--space-4); }
    input[type="text"] { width:100%; padding:1rem; border-radius:var(--radius-md); border:1px solid var(--color-border); background:var(--color-surface-2); color:var(--color-text); font-size:var(--text-base); }
    .feedback { font-weight:700; min-height:1.5em; }
    .mode-switch { margin-top:var(--space-6); }
    @media (max-width:640px){ .wrap{padding:var(--space-4);} .topbar{flex-direction:column;align-items:flex-start;} button{width:100%;} }

</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>日本旅行50句字卡</h1>
        <p>已經預載 50 句，不使你自己輸入。可直接睇卡、播音、做練習。</p>
      </div>
      <div class="controls">
        <button class="ghost" id="themeBtn">🌙 / ☀️</button>
        <button class="primary" id="speakBtn">🔊 讀出</button>
        <button class="ghost" id="flipBtn">🔁 顯示答案</button>
      </div>
    </div>

    <div class="panel filters" id="filters"></div>

    <div class="panel card">
      <div>
        <div class="meta"><span id="category"></span><span id="counter"></span></div>
        <div class="jp" id="jp"></div>
        <div class="reading" id="reading"></div>
        <div class="meaning hidden" id="meaning"></div>
        <div class="example hidden" id="example"></div>
      </div>
      <div class="nav-actions">
        <button class="ghost" id="prevBtn">← 上一張</button>
        <button class="primary" id="nextBtn">下一張 →</button>
      </div>
    </div>

    <div class="panel mode-switch">
      <div class="controls">
        <button class="primary" id="cardModeBtn">字卡模式</button>
        <button class="ghost" id="practiceModeBtn">練習模式</button>
      </div>
    </div>

    <div class="panel practice hidden" id="practicePanel">
      <div>
        <h2>練習模式</h2>
        <p class="small">而家唔使你自己加句子，只會抽已經內置嘅 50 句俾你練。</p>
      </div>
      <div id="practicePrompt" class="meaning"></div>
      <input type="text" id="practiceInput" placeholder="輸入你記得的日文或羅馬拼音" />
      <div class="practice-actions">
        <button class="primary" id="checkBtn">檢查</button>
        <button class="ghost" id="revealBtn">睇答案＋播音</button>
        <button class="ghost" id="newPracticeBtn">換一句</button>
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="small" id="practiceAnswer"></div>
    </div>
  </div>

    ];

    let current = 0, currentFilter = '全部', shown = false;
    let practiceIndex = 0;
    const categories = ['全部', ...new Set(cards.map(c => c.cat))];
    const el = id => document.getElementById(id);

    function filteredCards(){ return currentFilter === '全部' ? cards : cards.filter(c => c.cat === currentFilter); }
    function renderFilters(){
      el('filters').innerHTML = categories.map(cat => `<button class="chip ${cat===currentFilter?'active':''}" data-cat="${cat}">${cat}</button>`).join('');
      document.querySelectorAll('[data-cat]').forEach(btn => btn.onclick = () => { currentFilter = btn.dataset.cat; current = 0; shown = false; renderFilters(); renderCard(); newPractice(); });
    }
    function renderCard(){
      const list = filteredCards(); const card = list[current % list.length];
      el('category').textContent = card.cat; el('counter').textContent = `${(current % list.length)+1} / ${list.length}`;
      el('jp').textContent = card.jp; el('reading').textContent = card.kana; el('meaning').textContent = `中文：${card.zh}`; el('example').textContent = `用法：${card.ex}`;
      el('meaning').classList.toggle('hidden', !shown); el('example').classList.toggle('hidden', !shown);
      el('flipBtn').textContent = shown ? '🙈 收起答案' : '🔁 顯示答案';
    }
    function speak(text){
      if(!('speechSynthesis' in window)){ alert('此瀏覽器不支援語音朗讀'); return; }
      const u = new SpeechSynthesisUtterance(text); u.lang='ja-JP'; u.rate=0.1;
      const voices = speechSynthesis.getVoices(); const ja = voices.find(v => (v.lang||'').toLowerCase().includes('ja'));
      if(ja) u.voice = ja; speechSynthesis.cancel(); speechSynthesis.speak(u);
    }
    function normalize(s){ return s.toLowerCase().replace(/[。？?！!\s]/g,'').trim(); }
    function newPractice(){
      const list = filteredCards(); practiceIndex = Math.floor(Math.random()*list.length); const card = list[practiceIndex];
      el('practicePrompt').textContent = `請講／寫出日文：${card.zh}`; el('practiceInput').value=''; el('feedback').textContent=''; el('practiceAnswer').textContent='';
    }
    el('prevBtn').onclick = () => { current = (current - 1 + filteredCards().length) % filteredCards().length; shown = false; renderCard(); };
    el('nextBtn').onclick = () => { current = (current + 1) % filteredCards().length; shown = false; renderCard(); };
    el('flipBtn').onclick = () => { shown = !shown; renderCard(); };
    el('speakBtn').onclick = () => speak(filteredCards()[current].jp);
    el('themeBtn').onclick = () => { const root = document.documentElement; root.setAttribute('data-theme', root.getAttribute('data-theme')==='dark'?'light':'dark'); };
    el('cardModeBtn').onclick = () => { el('practicePanel').classList.add('hidden'); };
    el('practiceModeBtn').onclick = () => { el('practicePanel').classList.remove('hidden'); newPractice(); };
    el('checkBtn').onclick = () => {
      const card = filteredCards()[practiceIndex], ans = normalize(el('practiceInput').value);
      if(!ans){ el('feedback').textContent='你可以先試打羅馬拼音都得。'; return; }
      if(ans === normalize(card.jp) || ans === normalize(card.kana)) { el('feedback').textContent='答得啱！'; }
      else { el('feedback').textContent='未完全啱，但方向正確，對一對答案。'; }
      el('practiceAnswer').textContent = `${card.jp}｜${card.kana}｜${card.zh}`;
    };
    el('revealBtn').onclick = () => { const card = filteredCards()[practiceIndex]; el('practiceAnswer').textContent = `${card.jp}｜${card.kana}｜${card.zh}`; speak(card.jp); };
    el('newPracticeBtn').onclick = newPractice;

    renderFilters(); renderCard(); newPractice();
  </script>
