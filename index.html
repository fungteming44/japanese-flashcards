<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Flashcards</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f8f9fa; color: #333; }
        .card { width: 85%; max-width: 400px; height: 300px; background: white; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); cursor: pointer; text-align: center; padding: 20px; transition: transform 0.2s; -webkit-tap-highlight-color: transparent; }
        .card:active { transform: scale(0.98); }
        .japanese { font-size: 2.8rem; font-weight: bold; margin-bottom: 20px; word-break: break-all; }
        .chinese { font-size: 1.8rem; color: #007bff; opacity: 0; transition: opacity 0.3s; }
        .chinese.visible { opacity: 1; }
        .controls { margin-top: 40px; width: 85%; max-width: 400px; display: flex; flex-direction: column; gap: 20px; }
        .speed-control { display: flex; align-items: center; justify-content: space-between; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input[type="range"] { flex-grow: 1; margin: 0 15px; }
        .btn-group { display: flex; gap: 15px; }
        button { flex: 1; padding: 15px; font-size: 1.1rem; border: none; border-radius: 12px; background: #007bff; color: white; cursor: pointer; font-weight: 600; box-shadow: 0 4px 6px rgba(0,123,255,0.2); }
        button#speak { background: #28a745; box-shadow: 0 4px 6px rgba(40,167,69,0.2); }
        .hint { margin-top: 15px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card" id="card">
        <div class="japanese" id="japanese">読み込み中...</div>
        <div class="chinese" id="chinese">讀取中...</div>
    </div>
    <p class="hint">點擊卡片查看答案</p>
    
    <div class="controls">
        <div class="speed-control">
            <span>語速: <span id="speedValue">0.8</span>x</span>
            <input type="range" id="speed" min="0.3" max="1.5" step="0.1" value="0.8">
        </div>
        <div class="btn-group">
            <button id="speak">🔊 播放</button>
            <button id="next">下一個</button>
        </div>
    </div>

    <script>
        const flashcards = [
            { jp: "空港", reading: "くうこう", cn: "機場" },
            { jp: "駅", reading: "えき", cn: "車站" },
            { jp: "ホテル", reading: "ほてる", cn: "酒店" },
            { jp: "レストラン", reading: "れすとらん", cn: "餐廳" },
            { jp: "コンビニ", reading: "こんびに", cn: "便利店" },
            { jp: "地下鉄", reading: "ちかてつ", cn: "地鐵" },
            { jp: "切符", reading: "きっぷ", cn: "車票" },
            { jp: "出口", reading: "でぐち", cn: "出口" },
            { jp: "入口", reading: "いりぐち", cn: "入口" },
            { jp: "お手洗い", reading: "おてあらい", cn: "洗手間" },
            { jp: "観光地", reading: "かんこうち", cn: "景點" },
            { jp: "神社", reading: "じんじゃ", cn: "神社" },
            { jp: "お寺", reading: "おてら", cn: "寺廟" },
            { jp: "予約", reading: "よやく", cn: "預約" },
            { jp: "免税", reading: "めんぜい", cn: "免稅" }
        ];

        let currentIndex = 0;
        const card = document.getElementById('card');
        const jpEl = document.getElementById('japanese');
        const cnEl = document.getElementById('chinese');
        const speedInput = document.getElementById('speed');
        const speedValue = document.getElementById('speedValue');
        const nextBtn = document.getElementById('next');
        const speakBtn = document.getElementById('speak');

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ja-JP';
            utterance.rate = parseFloat(speedInput.value);
            window.speechSynthesis.speak(utterance);
        }

        function showCard() {
            const item = flashcards[currentIndex];
            jpEl.innerHTML = `${item.jp}<br><small style="font-size: 1.2rem; font-weight: normal; color: #666;">(${item.reading})</small>`;
            cnEl.textContent = item.cn;
            cnEl.classList.remove('visible');
            speak(item.jp);
        }

        card.addEventListener('click', () => {
            cnEl.classList.toggle('visible');
        });

        nextBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            currentIndex = Math.floor(Math.random() * flashcards.length);
            showCard();
        });

        speakBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            speak(flashcards[currentIndex].jp);
        });

        speedInput.addEventListener('input', () => {
            speedValue.textContent = speedInput.value;
        });

        // 初始化
        window.onload = showCard;
    </script>
</body>
</html>
